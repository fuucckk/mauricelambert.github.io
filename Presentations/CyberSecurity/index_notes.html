<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaker Notes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00aa2a;
      --green-ghost: rgba(0,255,65,0.07);
      --amber: #ffb300;
      --bg: #060d06;
      --bg2: #0b160b;
      --border: rgba(0,255,65,0.22);
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --font-display: 'VT323', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 999;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      height: 100vh;
      padding: 0;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 1px;
    }
    #header .logo {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--green);
      letter-spacing: 3px;
    }
    #header .status {
      display: flex; gap: 20px;
    }
    #header .status span { color: var(--green-dim); }
    #header .status strong { color: var(--green); }
    #sync-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px;
    }
    #sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green-dim);
      transition: background 0.3s;
    }
    #sync-dot.active { background: var(--green); animation: pulse 0.4s ease-out; }
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.8)} 100%{transform:scale(1)} }

    #prev-ghost {
      padding: 10px 24px 8px;
      border-bottom: 1px dashed rgba(0,255,65,0.12);
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #prev-ghost:hover { opacity: 0.65; }
    #prev-ghost .ghost-label {
      font-size: 10px; letter-spacing: 2px; color: var(--green-dim);
      white-space: nowrap;
      writing-mode: horizontal-tb;
    }
    #prev-ghost .ghost-title {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--green-dim);
      color: #a0e8a0;
      color: #c8ffc8;
      color: #e0ffe0;
      letter-spacing: 1px;
    }
    #prev-ghost .ghost-note {
      font-size: 11px; color: #3a7a3a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 400px;
    }

    #main {
      padding: 0 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #main::-webkit-scrollbar { width: 4px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #slide-header {
      padding: 18px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    #slide-counter {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--green-dim);
      white-space: nowrap;
    }
    #slide-title {
      font-family: var(--font-display);
      font-size: 38px;
      color: var(--green);
      letter-spacing: 2px;
      line-height: 1;
      word-break: break-word;
    }

    #notes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #notes-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(0,255,65,0.07);
      font-size: 15px;
      font-size: 17px;
      line-height: 1.5;
      color: #c8ffc8;
      color: #e8ffe8;
      animation: fadeIn 0.25s ease-out both;
    }
    #notes-list li:last-child { border-bottom: none; }
    #notes-list li .bullet {
      color: var(--green);
      font-size: 18px;
      margin-top: 1px;
      flex-shrink: 0;
      user-select: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    #notes-list li:nth-child(1) { animation-delay: 0.00s; }
    #notes-list li:nth-child(2) { animation-delay: 0.04s; }
    #notes-list li:nth-child(3) { animation-delay: 0.08s; }
    #notes-list li:nth-child(4) { animation-delay: 0.12s; }
    #notes-list li:nth-child(5) { animation-delay: 0.16s; }
    #notes-list li:nth-child(6) { animation-delay: 0.20s; }
    #notes-list li:nth-child(7) { animation-delay: 0.24s; }
    #notes-list li:nth-child(8) { animation-delay: 0.28s; }

    .no-notes {
      color: #2a5a2a;
      font-size: 13px;
      padding: 20px 0;
      font-style: italic;
    }

    #next-ghost {
      padding: 8px 24px 10px;
      border-top: 1px dashed rgba(0,255,65,0.12);
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #next-ghost:hover { opacity: 0.65; }
    #next-ghost .ghost-label {
      font-size: 10px; letter-spacing: 2px; color: var(--green-dim);
      white-space: nowrap;
    }
    #next-ghost .ghost-title {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--green-dim);
      color: #a0e8a0;
      color: #c8ffc8;
      color: #e0ffe0;
      letter-spacing: 1px;
    }
    #next-ghost .ghost-note {
      font-size: 11px; color: #3a7a3a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 400px;
    }

    #nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      gap: 12px;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 7px 18px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-btn:hover {
      background: var(--green-ghost);
      border-color: var(--green);
    }
    .nav-btn:active { transform: scale(0.97); }
    .nav-btn:disabled {
      opacity: 0.25; cursor: default;
      background: transparent !important;
    }

    #progress-bar-wrap {
      flex: 1;
      height: 3px;
      background: rgba(0,255,65,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--green);
      transition: width 0.3s ease;
    }

    #slide-position {
      font-size: 11px;
      color: var(--green-dim);
      white-space: nowrap;
      letter-spacing: 1px;
      min-width: 60px;
      text-align: right;
    }

    #flash {
      position: fixed; inset: 0;
      background: rgba(0,255,65,0.04);
      pointer-events: none;
      opacity: 0;
      z-index: 998;
      transition: opacity 0.05s;
    }
    #flash.on { opacity: 1; }

    #timers {
      display: flex;
      gap: 24px;
    }
    #timers .timer-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    #timers .timer-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--green-dim);
    }
    #timers .timer-value {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--amber);
      letter-spacing: 2px;
      line-height: 1;
    }
  </style>
</head>
<body>
<div id="flash"></div>
<div id="app">

  <div id="header">
    <span class="logo">// SPEAKER NOTES</span>
    <div id="timers">
      <div class="timer-block">
        <span class="timer-label">FROM OPEN</span>
        <span class="timer-value" id="timer-open">00:00</span>
      </div>
      <div class="status">
        <span><strong id="hdr-title">─</strong></span>
      </div>
      <div class="timer-block">
        <span class="timer-label">FROM START</span>
        <span class="timer-value" id="timer-start">──:──</span>
      </div>
    </div>
    <div id="sync-indicator">
      <div id="sync-dot"></div>
      <span id="sync-label">SYNC OFF</span>
    </div>
  </div>

  <div id="next-ghost" onclick="navigate(1)">
    <span class="ghost-label">NEXT ▶</span>
    <span class="ghost-title" id="next-title">─</span>
    <span class="ghost-note" id="next-note"></span>
  </div>

  <div id="main">
    <div id="slide-header">
      <span id="slide-counter">01</span>
      <span id="slide-title">─</span>
    </div>
    <ul id="notes-list"></ul>
  </div>

  <div id="prev-ghost" onclick="navigate(-1)">
    <span class="ghost-label">◀ PREV</span>
    <span class="ghost-title" id="prev-title">─</span>
    <span class="ghost-note" id="prev-note"></span>
  </div>

  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ PREVIOUS</button>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <span id="slide-position">1 / 1</span>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">NEXT ▶</button>
  </div>

</div>

<script>
// window.SLIDES_NOTES = notes_interpolation;
const SLIDES = window.SLIDES_NOTES || [
  {
    "title": "Cybersecurity for Everyone: Understanding Digital Security, Risks, Vulnerabilities & Cyber Attacks",
    "notes": []
  },
  {
    "title": "Table des matières",
    "notes": []
  },
  {
    "title": "What Is Cybersecurity ? Understanding Digital Systems Security",
    "notes": [
      "D'après vous, qu'est ce que la cybersécurité ?"
    ]
  },
  {
    "title": "Cybersecurity as the Security of Digital Systems",
    "notes": [
      "La définition de la cybersécurité est souvent résumée à la sécurité des systèmes numériques.",
      "Les systèmes numériques sont perçus comme tous ces appareils connectés qui façonnent la vie moderne.",
      "Quelques \"petits\" exemples : ordinateurs, tablettes et téléphones.",
      "Les accès à Internet et les communications sans fil pourraient également être impactés, empêchant toute communication à distance utilisée de nos jours de manière courante.",
      "Tous les objets connectés seraient également concernés. Par exemple, si vous avez une bouilloire connectée, elle pourrait devenir inutilisable.",
      "Et si vous avez un compteur Linky, auriez-vous de l'électricité chez vous ? Oui, si les infrastructures électriques arrivent à gérer le flux sans les informations des compteurs. Dans le cas contraire, on pourrait observer des impacts sur la distribution.",
      "Et sans système de paiement ? Plus d'achats en ligne, de paiements par carte bancaire ou de retraits d'espèces.",
      "On peut aussi imaginer les systèmes de santé : plus de systèmes d'information dans les hôpitaux pour gérer les patients, les salles, les rendez-vous des médecins, les urgences ou simplement les données de santé."
    ]
  },
  {
    "title": "Digital Systems: Simple Operations Creating Complex Environments",
    "notes": [
      "On va temporairement, le temps d'une slide, parler d'éléments un peu abstraits des systèmes numériques.",
      "Les systèmes numériques sont basés sur des composants de calcul binaire, c'est-à-dire à deux états, souvent représentés par des 0 et des 1.",
      "Pour les humains, les 0 et les 1 sont difficilement lisibles. Les flux de données ou d'instructions sont souvent plus lisibles sous forme de code ou d'éléments textuels.",
      "Parfois, pour bien comprendre le fonctionnement en détail, on est obligé de descendre plus bas. Pour cela, on représente les 0 et les 1 par groupes de 8 (qu'on appelle des octets) et on les représente sous forme hexadécimale et, de temps en temps, décimale.",
      "Ces flux de 0 et de 1 sont prévisibles à l'échelle humaine, mais restent compris par des couches intermédiaires opaques, pas toujours connues des développeurs ou parfois mal interprétées.",
      "Si quelqu'un arrive à modifier ces flux de 0 et de 1, qui représentent les données et parfois même les instructions de calcul, alors il peut modifier le comportement des appareils électroniques et donc les compromettre.",
      "Les chercheurs en vulnérabilités n'ont pas toujours besoin de descendre aussi bas dans les couches des systèmes. Ils peuvent modifier les flux simplement avec du \"texte\" lisible par l'homme ou avec des données forgées dans un format que l'appareil ou l'application comprend."
    ]
  },
  {
    "title": "Cyberattack Concepts: Vulnerability, Risk, and Threat",
    "notes": [
      "Maintenant que nous avons bien compris pourquoi la cybersécurité était un problème important â€” les systèmes sont de plus en plus nombreux, avec de plus en plus de responsabilités, et qu'en plus ils sont extrêmement compliqués au point que les développeurs ne les comprennent pas toujours dans tous les détails â€” nous pouvons regarder quels sont les prérequis pour une cyberattaque.",
      "Les prérequis peuvent être vus de la manière suivante : un risque, une vulnérabilité et une menace.",
      "Le risque est défini comme un danger éventuel plus ou moins prévisible. Par exemple, un risque pourrait être de se faire cambrioler.",
      "Pour ce risque, il existe tout un tas de vulnérabilités, comme une fenêtre qui ne ferme plus. La vulnérabilité, c'est la faiblesse qui permet de rendre le risque réalisable.",
      "Enfin, la menace, c'est l'élément qui amène la volonté de nuire. Toujours pour le même risque, ce serait le cambrioleur ou le commanditaire du cambriolage."
    ]
  },
  {
    "title": "The CIA Triad: The Criteria of Cybersecurity Strategy",
    "notes": [
      "La stratégie de la cybersécurité utilise 3 critères que nous pouvons employer pour bien comprendre ce qu'est la cybersécurité.",
      "Le premier principe est la confidentialité : nous n'avons pas envie que n'importe qui dans le monde voie nos photos et nos messages.",
      "Le second élément est l'intégrité. En effet, nous n'avons pas envie que notre nom et notre prénom changent sans notre consentement.",
      "Enfin, le dernier critère est la disponibilité, parce que lorsqu'on va aux urgences, on souhaite que le médecin qui nous prend en charge connaisse nos traitements en cours ou nos allergies afin d'éviter toute interaction médicamenteuse dangereuse.",
      "En fait, nous venons, grâce à ces critères, d'ajouter un élément fondamental de la cybersécurité : les données. Ce n'est pas seulement une question de disponibilité des services, c'est aussi la \"qualité\" de l'information."
    ]
  },
  {
    "title": "Who Makes Data Available, Reads It, and Modifies It ?",
    "notes": [
      "Nous avons défini les trois critères fondamentaux, nous avons ajouté un élément important à la cybersécurité, et si nous les utilisions pour nous poser quelques questions afin de mieux comprendre la cybersécurité ?",
      "Qu'est-ce qui lit les données ? Qu'est-ce qui modifie les données ? Et qu'est-ce qui rend les données accessibles ?",
      "Les appareils numériques les rendent disponibles, mais ce sont les humains qui les lisent au final et ce sont eux qui les modifient.",
      "La question de la cybersécurité n'est peut-être pas uniquement celle de la sécurité du matériel et des services numériques."
    ]
  },
  {
    "title": "Complete Cybersecurity Definition: Systems, Data, Context and Users",
    "notes": [
      "Nous avons défini la cybersécurité comme étant la sécurité des systèmes numériques et nous avons compris pourquoi ils pouvaient être aussi vulnérables.",
      "Ensuite, nous nous sommes rendu compte que les données étaient au moins aussi importantes que le système lui-même et qu'il fallait les ajouter dans la définition de la cybersécurité.",
      "Nous nous sommes rendu compte que ces données étaient utilisées dans un but final de lecture et de modification par des utilisateurs qui doivent donc être inclus dans la définition aussi.",
      "Nous arrivons donc à la conclusion que la cybersécurité, c'est la sécurité des systèmes numériques, de leurs contenus, de leurs utilisations et du contexte de leurs utilisations. La sécurité inclut bien sûr la sûreté, donc les accidents des systèmes, tout autant que les attaques volontairement malveillantes."
    ]
  },
  {
    "title": "Cybersecurity Etymology: The Origin of the Word \"Cyber\"",
    "notes": [
      "Le préfixe \"Cyber\" apporte le domaine des systèmes numériques au terme qu'il compose.",
      "Il vient de \"cybernetics\", provenant de \"cybernétique\", défini en France comme étant la science de gouverner les hommes.",
      "Cybernétique vient d'un mot grec qui signifie piloter un bateau, probablement pensé comme \"diriger un système complexe\".",
      "D'autres mots et noms modernes proviennent de ce même mot grec, comme Kubernetes, qui gère et orchestre des systèmes de conteneurs."
    ]
  },
  {
    "title": "My path, my passion: cybersecurity",
    "notes": []
  }
];

let current = 0;
const total  = SLIDES.length;
let syncEnabled = false;

const timeOpen  = Date.now();
let   timeStart = null;

function formatTime(ms) {
  const s   = Math.floor(ms / 1000);
  const min = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return min + ':' + sec;
}

setInterval(() => {
  document.getElementById('timer-open').textContent  = formatTime(Date.now() - timeOpen);
  document.getElementById('timer-start').textContent =
    timeStart ? formatTime(Date.now() - timeStart) : '──:──';
}, 500);

const bc = new BroadcastChannel('presentation_sync');

bc.onmessage = (e) => {
  if (!syncEnabled) return;
  if (e.data?.type === 'slide_change' && typeof e.data.index === 'number') {
    if (e.data.index !== current) {
      current = Math.max(0, Math.min(total - 1, e.data.index));
      render(false);
      flashSync();
    }
  }
};

function broadcast(index) {
  if (syncEnabled) {
    bc.postMessage({ type: 'slide_change', index });
  }
}

document.getElementById('sync-indicator').addEventListener('click', () => {
  syncEnabled = !syncEnabled;
  document.getElementById('sync-dot').style.background   = syncEnabled ? 'var(--green)' : 'var(--green-dim)';
  document.getElementById('sync-label').textContent      = syncEnabled ? 'SYNC ON' : 'SYNC OFF';
  if (syncEnabled) broadcast(current);
});

function flashSync() {
  const dot = document.getElementById('sync-dot');
  dot.classList.add('active');
  setTimeout(() => dot.classList.remove('active'), 400);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= total) return;
  current = next;
  if (current >= 1 && timeStart === null) timeStart = Date.now();
  render(true);
}

function render(shouldBroadcast = true) {
  const slide = SLIDES[current];
  const prev  = current > 0          ? SLIDES[current - 1] : null;
  const next  = current < total - 1  ? SLIDES[current + 1] : null;

  document.getElementById('hdr-title').textContent    = slide.title;
  document.getElementById('slide-counter').textContent = String(current + 1).padStart(2, '0');
  document.getElementById('slide-title').textContent  = slide.title;

  const ul = document.getElementById('notes-list');
  ul.innerHTML = '';
  if (slide.notes && slide.notes.length > 0) {
    slide.notes.forEach(note => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="bullet">▸</span><span>${escHtml(note)}</span>`;
      ul.appendChild(li);
    });
  } else {
    ul.innerHTML = '<li class="no-notes">// no notes for this slide</li>';
  }

  const prevGhost = document.getElementById('prev-ghost');
  document.getElementById('prev-title').textContent = prev ? prev.title : '─';
  document.getElementById('prev-note').textContent  = prev && prev.notes[0] ? prev.notes[0] : '';
  prevGhost.style.visibility = prev ? 'visible' : 'hidden';

  const nextGhost = document.getElementById('next-ghost');
  document.getElementById('next-title').textContent = next ? next.title : '─';
  document.getElementById('next-note').textContent  = next && next.notes[0] ? next.notes[0] : '';
  nextGhost.style.visibility = next ? 'visible' : 'hidden';

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;

  const pct = total > 1 ? (current / (total - 1)) * 100 : 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('slide-position').textContent = (current + 1).toString() + " / " + String(total);

  document.getElementById('main').scrollTop = 0;

  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 80);

  if (shouldBroadcast) broadcast(current);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); navigate(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); navigate(-1);
  } else if (e.key === 's' || e.key === 'S') {
    document.getElementById('sync-indicator').click();
  }
});

render(false);
</script>
</body>
</html>
