let current = 0;
const total  = SLIDES.length;
let syncEnabled = false;

const timeOpen  = Date.now();
let   timeStart = null;

function formatTime(ms) {
  const s   = Math.floor(ms / 1000);
  const min = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return min + ':' + sec;
}

setInterval(() => {
  document.getElementById('timer-open').textContent  = formatTime(Date.now() - timeOpen);
  document.getElementById('timer-start').textContent =
    timeStart ? formatTime(Date.now() - timeStart) : '──:──';
}, 500);

const bc = new BroadcastChannel('presentation_sync');

bc.onmessage = (e) => {
  if (!syncEnabled) return;
  if (e.data?.type === 'slide_change' && typeof e.data.index === 'number') {
    if (e.data.index !== current) {
      current = Math.max(0, Math.min(total - 1, e.data.index));
      render(false);
      flashSync();
    }
  }
};

function broadcast(index) {
  if (syncEnabled) {
    bc.postMessage({ type: 'slide_change', index });
  }
}

document.getElementById('sync-indicator').addEventListener('click', () => {
  syncEnabled = !syncEnabled;
  document.getElementById('sync-dot').style.background   = syncEnabled ? 'var(--green)' : 'var(--green-dim)';
  document.getElementById('sync-label').textContent      = syncEnabled ? 'SYNC ON' : 'SYNC OFF';
  if (syncEnabled) broadcast(current);
});

function flashSync() {
  const dot = document.getElementById('sync-dot');
  dot.classList.add('active');
  setTimeout(() => dot.classList.remove('active'), 400);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= total) return;
  current = next;
  if (current >= 1 && timeStart === null) timeStart = Date.now();
  render(true);
}

function render(shouldBroadcast = true) {
  const slide = SLIDES[current];
  const prev  = current > 0          ? SLIDES[current - 1] : null;
  const next  = current < total - 1  ? SLIDES[current + 1] : null;

  document.getElementById('hdr-title').textContent    = slide.title;
  document.getElementById('slide-counter').textContent = String(current + 1).padStart(2, '0');
  document.getElementById('slide-title').textContent  = slide.title;

  const ul = document.getElementById('notes-list');
  ul.innerHTML = '';
  if (slide.notes && slide.notes.length > 0) {
    slide.notes.forEach(note => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="bullet">▸</span><span>${escHtml(note)}</span>`;
      ul.appendChild(li);
    });
  } else {
    ul.innerHTML = '<li class="no-notes">// no notes for this slide</li>';
  }

  const prevGhost = document.getElementById('prev-ghost');
  document.getElementById('prev-title').textContent = prev ? prev.title : '─';
  document.getElementById('prev-note').textContent  = prev && prev.notes[0] ? prev.notes[0] : '';
  prevGhost.style.visibility = prev ? 'visible' : 'hidden';

  const nextGhost = document.getElementById('next-ghost');
  document.getElementById('next-title').textContent = next ? next.title : '─';
  document.getElementById('next-note').textContent  = next && next.notes[0] ? next.notes[0] : '';
  nextGhost.style.visibility = next ? 'visible' : 'hidden';

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;

  const pct = total > 1 ? (current / (total - 1)) * 100 : 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('slide-position').textContent = (current + 1).toString() + " / " + String(total);

  document.getElementById('main').scrollTop = 0;

  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 80);

  if (shouldBroadcast) broadcast(current);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); navigate(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); navigate(-1);
  } else if (e.key === 's' || e.key === 'S') {
    document.getElementById('sync-indicator').click();
  }
});

render(false);
</script>
